name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ClinSize-macos
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ClinSize-macos-intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ClinSize-windows
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: ClinSize-linux
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install dependencies
        run: just setup
      - name: Build installers
        run: cd apps/desktop && pnpm tauri build --target ${{ matrix.target }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          if-no-files-found: error
